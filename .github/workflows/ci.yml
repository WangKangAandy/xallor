# GitHub Actions：与 docs/v2-volume-and-maintainability.md 中 CI 说明一致
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: i18n validate (locale parity, t() keys, unused keys)
        run: npm run i18n:validate

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Production build
        run: npm run build
